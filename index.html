<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#020308" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Calamityville" />
  <meta
    name="description"
    content="Calamityville — live disasters on a 3D Earth: earthquakes, tsunamis, tornadoes, hurricanes, floods, wildfires, and volcanoes."
  />
  <title>Calamityville</title>
  <link rel="icon" type="image/png" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://earthquake.usgs.gov" crossorigin />
  <link rel="preconnect" href="https://www.nhc.noaa.gov" crossorigin />
  <link rel="preconnect" href="https://eonet.gsfc.nasa.gov" crossorigin />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="preload" href="stars-8k.jpg" as="image" type="image/jpeg" />
  <link rel="preload" href="moon-2k.jpg" as="image" type="image/jpeg" />
  <link rel="preload" href="moon-normal-2k.jpg" as="image" type="image/jpeg" />
  <link rel="preload" href="sun-2k.jpg" as="image" type="image/jpeg" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #020308;
      --text: #e8edf7;
      --muted: #8b95a8;
      --surface: rgba(12, 16, 28, 0.82);
      --border: rgba(255, 255, 255, 0.1);
      --accent: #4a9eff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      max-height: 100dvh;
      min-height: 100lvh;
      overflow: hidden;
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    }

    .fit-stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    .fit-stage--fluid .app {
      width: 100%;
      height: 100%;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #globe-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .chrome {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .chrome > * { pointer-events: auto; }

    .time-toggle {
      position: absolute;
      top: max(0.75rem, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.25rem;
      padding: 0.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .time-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 0.72rem;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .time-btn.active {
      background: rgba(74, 158, 255, 0.22);
      color: var(--text);
    }

    .center-toggle {
      position: absolute;
      top: max(0.75rem, env(safe-area-inset-top));
      right: max(0.75rem, env(safe-area-inset-right));
      display: flex;
      gap: 0.25rem;
      padding: 0.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .center-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 0.72rem;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .center-btn.active {
      background: rgba(74, 158, 255, 0.22);
      color: var(--text);
    }

    @media (max-width: 767px) {
      .time-toggle {
        left: max(0.75rem, env(safe-area-inset-left));
        transform: none;
      }

      .time-btn,
      .center-btn {
        font-size: 0.68rem;
        padding: 0.32rem 0.6rem;
      }
    }

    .legend {
      position: absolute;
      bottom: max(0.75rem, env(safe-area-inset-bottom));
      left: max(0.75rem, env(safe-area-inset-left));
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem 0.7rem;
      padding: 0.45rem 0.65rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.55rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 0.65rem;
      color: var(--muted);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      border: none;
      background: transparent;
      font: inherit;
      font-size: inherit;
      color: inherit;
      cursor: pointer;
      padding: 0.15rem 0.2rem;
      border-radius: 0.35rem;
      transition: opacity 0.2s, background 0.15s;
    }

    .legend-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .legend-item.off {
      opacity: 0.32;
    }

    .legend-item.active {
      opacity: 1;
    }

    .legend-dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dot--tornado {
      background: radial-gradient(circle at center, #ff2d55 0 60%, #f8fafc 61%);
    }

    #event-count {
      position: absolute;
      bottom: max(0.75rem, env(safe-area-inset-bottom));
      right: max(0.75rem, env(safe-area-inset-right));
      font-size: 0.68rem;
      color: var(--muted);
      padding: 0.35rem 0.55rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.45rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 3;
    }

    .loading.visible { opacity: 1; }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 10;
    }

    .sheet-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .event-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 11;
      background: rgba(10, 14, 24, 0.96);
      border-top: 1px solid var(--border);
      border-radius: 1rem 1rem 0 0;
      padding: 1rem 1.1rem max(1.25rem, env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      max-height: 55dvh;
      overflow-y: auto;
    }

    .event-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 2.25rem;
      height: 0.2rem;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      margin: 0 auto 0.85rem;
    }

    .sheet-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }

    #sheet-type {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    #sheet-close {
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 50%;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }

    #sheet-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 0.35rem;
      line-height: 1.3;
    }

    #sheet-time {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    #sheet-tsunami {
      display: none;
      font-size: 0.68rem;
      font-weight: 600;
      color: #5ac8fa;
      margin-top: 0.35rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #sheet-tsunami.visible {
      display: block;
    }

    #sheet-desc {
      font-size: 0.85rem;
      line-height: 1.5;
      margin-top: 0.75rem;
      color: #c8d0e0;
    }

    .sheet-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.85rem;
      gap: 0.5rem;
    }

    #sheet-source {
      font-size: 0.68rem;
      color: var(--muted);
    }

    #sheet-link {
      font-size: 0.72rem;
      color: var(--accent);
      text-decoration: none;
    }

    #sheet-link:hover { text-decoration: underline; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="fit-stage" class="fit-stage">
    <div id="app" class="app">
      <canvas id="globe-canvas" aria-label="3D Earth and Moon. Drag to orbit, pinch to zoom, tap pins for event details."></canvas>

      <div class="chrome">
        <div class="time-toggle" role="group" aria-label="Time range">
          <button type="button" class="time-btn active" data-hours="72">72h</button>
          <button type="button" class="time-btn" data-hours="48">48h</button>
          <button type="button" class="time-btn" data-hours="24">24h</button>
        </div>

        <div class="center-toggle" role="group" aria-label="Orbit center">
          <button type="button" class="center-btn active" data-center="earth">Earth</button>
          <button type="button" class="center-btn" data-center="moon">Moon</button>
        </div>

        <div class="legend" role="group" aria-label="Filter event types">
          <button type="button" class="legend-item active" data-type="earthquake" aria-pressed="true">
            <span class="legend-dot" style="background:#ff9f0a"></span>Earthquake
          </button>
          <button type="button" class="legend-item active" data-type="volcano" aria-pressed="true">
            <span class="legend-dot" style="background:#bf5af2"></span>Volcano
          </button>
          <button type="button" class="legend-item active" data-type="hurricane" aria-pressed="true">
            <span class="legend-dot" style="background:#9ca3af"></span>Hurricane
          </button>
          <button type="button" class="legend-item active" data-type="fire" aria-pressed="true">
            <span class="legend-dot" style="background:#ff2d55"></span>Wildfire
          </button>
          <button type="button" class="legend-item active" data-type="flood" aria-pressed="true">
            <span class="legend-dot" style="background:#30d158"></span>Flood
          </button>
          <button type="button" class="legend-item active" data-type="tornado" aria-pressed="true">
            <span class="legend-dot legend-dot--tornado"></span>Tornado
          </button>
          <button type="button" class="legend-item active" data-type="tsunami" aria-pressed="true">
            <span class="legend-dot" style="background:#5ac8fa"></span>Tsunami
          </button>
        </div>

        <p id="event-count">0 events</p>
      </div>

      <p id="loading" class="loading" aria-live="polite">Loading events…</p>
    </div>
  </div>

  <div id="sheet-backdrop" class="sheet-backdrop" aria-hidden="true"></div>
  <aside id="event-sheet" class="event-sheet" role="dialog" aria-labelledby="sheet-title" aria-modal="true">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-header">
      <div>
        <p id="sheet-type">Event</p>
        <h2 id="sheet-title">—</h2>
        <p id="sheet-time"></p>
        <p id="sheet-tsunami">Tsunami advisory</p>
      </div>
      <button type="button" id="sheet-close" aria-label="Close">×</button>
    </div>
    <p id="sheet-desc"></p>
    <div class="sheet-footer">
      <span id="sheet-source"></span>
      <a id="sheet-link" href="#" target="_blank" rel="noopener noreferrer">Details →</a>
    </div>
  </aside>

  <script src="fit-to-screen.js"></script>
  <script src="astronomy.js"></script>
  <script type="module">
    import { bootGlobe } from "./app.js";

    let globe = null;

    const fit = FitToScreen.create({
      stage: "fit-stage",
      app: "app",
      useScaleForLayout: () => false,
      onFit: () => {
        if (!globe) globe = bootGlobe();
        else globe.resize();
      },
    });

    fit.bindViewportListeners();
    fit.bootLayout();
  </script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
